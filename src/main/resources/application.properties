spring.application.name=armario-inteligente
spring.config.import=optional:file:.env[.properties]

# Servidor
server.port=${SERVER_PORT:8080}

# Banco de dados
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:armario}
spring.datasource.username=${DB_USER:armario}
spring.datasource.password=${DB_PASSWORD:armario}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:armario}
spring.flyway.user=${DB_USER:armario}
spring.flyway.password=${DB_PASSWORD:armario}
spring.flyway.clean-disabled=${SPRING_FLYWAY_CLEAN_DISABLED:false}
spring.flyway.clean-on-validation-error=${SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.br.com.unit.tokseg=${LOGGING_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BINDER:TRACE}
