spring.application.name=armario-inteligente
spring.config.import=optional:file:.env[.properties]

# Servidor
server.port=${SERVER_PORT:8080}

# Banco de dados
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.url=${DATABASE_URL}
spring.flyway.user=${DATABASE_USER:}
spring.flyway.password=${DATABASE_PASSWORD:}
spring.flyway.clean-disabled=${SPRING_FLYWAY_CLEAN_DISABLED:false}
spring.flyway.clean_on_validation_error=${SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Threads virtuais (Java 21+)
spring.threads.virtual.enabled=true

# Seguran├¦a
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
security.cors.allowed-methods=${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
security.cors.allowed-headers=${SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type}
security.cors.allow-credentials=${SECURITY_CORS_ALLOW_CREDENTIALS:true}
security.headers.hsts-enabled=${SECURITY_HEADERS_HSTS_ENABLED:false}
security.headers.hsts-max-age-seconds=${SECURITY_HEADERS_HSTS_MAX_AGE_SECONDS:31536000}
security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.max-requests=${SECURITY_RATE_LIMIT_MAX_REQUESTS:30}
security.rate-limit.window-seconds=${SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.br.com.unit.tokseg=${LOGGING_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BINDER:TRACE}
