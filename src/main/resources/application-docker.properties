# Configuração específica para ambiente Docker
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Pool de conexões
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Hibernate
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.current_session_context_class=thread
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.url=${DATABASE_URL}
spring.flyway.user=${DATABASE_USER:}
spring.flyway.password=${DATABASE_PASSWORD:}
spring.flyway.clean-disabled=${SPRING_FLYWAY_CLEAN_DISABLED:true}
spring.flyway.clean-on-validation-error=${SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Servidor
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# Threads virtuais (Java 21+)
spring.threads.virtual.enabled=true

# Segurança
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
security.cors.allowed-methods=${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
security.cors.allowed-headers=${SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
security.cors.allow-credentials=${SECURITY_CORS_ALLOW_CREDENTIALS:true}
security.headers.hsts-enabled=${SECURITY_HEADERS_HSTS_ENABLED:true}
security.headers.hsts-max-age-seconds=${SECURITY_HEADERS_HSTS_MAX_AGE_SECONDS:31536000}
security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.max-requests=${SECURITY_RATE_LIMIT_MAX_REQUESTS:30}
security.rate-limit.window-seconds=${SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}

# Swagger / OpenAPI
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.br.com.unit.tokseg=${LOGGING_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BINDER:TRACE}
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.redis.enabled=true
