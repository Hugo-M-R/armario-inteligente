# Configuração específica para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Threads virtuais (Java 21+)
spring.threads.virtual.enabled=true

# Segurança (testes)
security.cors.allowed-origins=http://localhost:3000
security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
security.cors.allowed-headers=Authorization,Content-Type
security.cors.allow-credentials=true
security.headers.hsts-enabled=false
security.headers.hsts-max-age-seconds=31536000
security.rate-limit.enabled=false
security.rate-limit.max-requests=30
security.rate-limit.window-seconds=60

